[bar/main]
width = 100%
height = 25
radius = 0
fixed-center = true
bottom = false

background = #1a1a2e
foreground = #ffffff

font-0 = "Fira Code:size=10"
font-1 = "Noto Sans:size=10"

modules-left = workspaces
modules-center = date
modules-right = pulseaudio cpu memory bluetooth sep

tray-position = right
tray-padding = 2
tray-background = #1a1a2e

[module/workspaces]
type = internal/xworkspaces
label-unfocused = %index%
label-focused = %index%
label-visible = %index%
label-urgent = %index%

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
format = <label>
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume>
format-muted = <label-muted>
label-muted = MUTE

[module/bluetooth]
type = custom/script
exec = bluetoothctl show 2>/dev/null | grep -q "Powered: yes" && echo "BT" || echo "off"
interval = 5
format = <label>
label = %output%
label-foreground = #888

[module/sep]
type = custom/text
content = |
content-foreground = #555

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = CPU %percentage%%

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = MEM %mb_used%/%mb_total%
